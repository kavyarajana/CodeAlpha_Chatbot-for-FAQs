<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI FAQ Chatbot</h1>
        </div>

        <div class="chat-container">
            <div class="chat-box" id="chatBox">
                <div class="bot-message">
                    <div class="message-content">
                        👋 Hi! I'm your FAQ Assistant. Ask me anything about our services!
                    </div>
                </div>
            </div>

            <div class="input-container">
                <input type="text" id="userInput" placeholder="Type your question here..." autocomplete="off">
                <button id="sendBtn">Send</button>
            </div>
        </div>

        <div class="faq-sidebar">
            <h3>📋 Sample FAQs</h3>
            <ul id="faqList"></ul>
        </div>
    </div>

    <footer>
        Built with HTML, CSS, JS | NLP: TF-IDF + Cosine Similarity
    </footer>

    <script src="script.js"></script>
</body>
</html>
